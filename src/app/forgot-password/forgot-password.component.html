<div class="fp-page">
  <div class="fp-card" *ngIf="!isSubmitted">
    <div class="fp-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="30" fill="#e8f4fd" stroke="#1565c0" stroke-width="2"/>
        <path d="M32 20a8 8 0 0 1 8 8v4H24v-4a8 8 0 0 1 8-8z" fill="#1565c0"/>
        <rect x="20" y="32" width="24" height="16" rx="3" fill="#1976d2"/>
        <circle cx="32" cy="40" r="2.5" fill="white"/>
        <line x1="32" y1="42.5" x2="32" y2="45" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <h2 class="fp-title">Forgot Password?</h2>
    <p class="fp-subtitle">
      Enter your registered email. We will send you a link to reset your password.
    </p>

    <div class="fp-form">
      <div class="input-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon">✉</span>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            placeholder="yourname@example.com"
            (keyup.enter)="onSubmit()"
          />
        </div>
        <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>
      </div>

      <button class="submit-btn" (click)="onSubmit()" [disabled]="isLoading">
        <span *ngIf="!isLoading">Send Reset Link</span>
        <span *ngIf="isLoading" class="loading-dots">
          <span></span><span></span><span></span>
        </span>
      </button>
    </div>

    <div class="fp-footer">
      <button class="back-btn" (click)="goToLogin()">
        ← Back to Login
      </button>
    </div>
  </div>

  
  <div class="fp-card success-card" *ngIf="isSubmitted">
    <div class="success-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="30" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
        <path d="M20 32 L28 41 L44 24" stroke="#2e7d32" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h2 class="fp-title" style="color: #2e7d32;">Email Sent!</h2>
    <p class="fp-subtitle">
      A password reset link has been sent to <strong>{{ email }}</strong>.<br/>
      Please check your inbox.
    </p>
    <p class="spam-note">📁 Didn’t receive the email? Check your Spam/Junk folder.</p>
    <button class="submit-btn" style="background: #2e7d32;" (click)="goToLogin()">
      Go to Login
    </button>
  </div>
</div>
